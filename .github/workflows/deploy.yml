name: Deploy Frontend to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            DEPLOY_DIR="/opt/visittime/prod"

            # Ensure deploy directory exists and is a git repo
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "❌ Repo not cloned yet. Run initial server setup first."
              exit 1
            fi

            cd "$DEPLOY_DIR"

            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "🐳 Building and starting containers..."
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo "🧹 Removing dangling images..."
            docker image prune -f

            echo "✅ Deploy complete."

      - name: Healthcheck
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sleep 10
            echo "🏥 Checking frontend..."
            curl -fsS --max-time 10 https://app.danila-master-ukhta.ru/ > /dev/null && echo "✅ Frontend OK" || echo "⚠️ Frontend not responding on HTTPS"
            echo "🏥 Checking /health..."
            curl -fsS --max-time 10 https://app.danila-master-ukhta.ru/health > /dev/null && echo "✅ Health OK" || echo "⚠️ Health endpoint not responding"
