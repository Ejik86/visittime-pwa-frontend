services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visittime-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot-webroot:/var/www/certbot:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
